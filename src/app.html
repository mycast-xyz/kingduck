<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- 기본 SEO/공유 메타 (페이지별 메타는 각 라우트의 svelte:head가 덮어씀) -->
		<meta
			name="description"
			content="킹덕(KingDuck) — 원신·스타레일·젠레스존제로·명조·니케·블루 아카이브 등 가챠 게임의 캐릭터·이벤트·캘린더·티어·쿠폰 정보를 한 곳에서 제공하는 비공식 정보 사이트."
		/>
		<meta property="og:site_name" content="KingDuck" />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="https://www.kingduck.xyz/favicon.png" />
		<meta name="twitter:card" content="summary" />
		<meta name="theme-color" content="#f9822c" />
		<!-- Google AdSense: 메타태그(사이트 확인) + 스크립트(확인 + 광고 게재) -->
		<meta name="google-adsense-account" content="ca-pub-7085750843275776" />
		<script
			async
			src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7085750843275776"
			crossorigin="anonymous"
		></script>
		<!-- Check & apply theme here to avoid FOUC -->
		<script>
			if (
				localStorage.theme === 'dark' ||
				(!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
			) {
				document.documentElement.classList.add('dark');
			} else {
				document.documentElement.classList.remove('dark');
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
